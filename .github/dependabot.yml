# Dependabot configuration for VoiceMode
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Python dependencies (main package) — managed via uv
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group every bump (major/minor/patch) into a single weekly PR.
      # Trades fine-grained review for a clean inbox; CI is the gate.
      python-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # Python dependencies (installer package) — managed via uv
  - package-ecosystem: "uv"
    directory: "/installer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "installer"
    commit-message:
      prefix: "deps(installer)"
      include: "scope"
    groups:
      installer-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
